name: Test

on:
  push:
    branches:
      - master
    tags: ["*"]
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/ReusableTest.yml
    with:
      os: ${{ matrix.os }}
      version: ${{ matrix.version }}
      arch: ${{ matrix.arch }}
      allow_failure: ${{ matrix.allow_failure }}
      run_codecov: ${{ matrix.version == '1' && matrix.os == 'ubuntu-latest' }}
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - "lts"
          - "1"
        os:
          - ubuntu-latest

        arch:
          - x64
        allow_failure: [false]
        include:
          - version: "nightly"
            os: ubuntu-latest
            arch: x64
            allow_failure: true
  Aqua:
    name: Aqua tests
    runs-on: ubuntu-latest
    permissions: # needed to allow julia-actions/cache to proactively delete old caches that it has created
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1"
      - uses: julia-actions/cache@v3
      - run: julia --project=test --color=yes -e 'using Pkg; Pkg.instantiate()'
      - run: julia --project=test --color=yes -e 'using Aqua, LinOps; Aqua.test_all(LinOps)'
